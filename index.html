<!DOCTYPE html>
<html lang="en">
<head>

  <title>Modern Home – Day Scene</title>
  <script src="aframe.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #hud {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.55); color: #1a2a4a;
      padding: 10px 28px; border-radius: 40px; font-size: 13px;
      letter-spacing: 1.5px; font-family: 'Courier New', monospace;
      border: 1px solid rgba(100,150,255,0.3); pointer-events: none;
      backdrop-filter: blur(8px);
    }
  </style>
</head>

<div id="hud">☀️ DAY SCENE &nbsp;|&nbsp; W A S D — Move &nbsp;|&nbsp; Mouse — Look</div>
